apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfinance-mcp
  namespace: fintech
  labels:
    app: openfinance-mcp
    version: "0.1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openfinance-mcp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: openfinance-mcp
        version: "0.1.0"
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: Always
        seccompProfile:
          type: RuntimeDefault

      serviceAccountName: openfinance-mcp-sa

      containers:
        - name: openfinance-mcp
          image: your-registry/openfinance-br-mcp:0.1.0
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: openfinance-mcp-config

          volumeMounts:
            - name: mtls-certs
              mountPath: /app/certs
              readOnly: true
            - name: app-secrets
              mountPath: /app/secrets
              readOnly: true

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

      volumes:
        - name: mtls-certs
          secret:
            secretName: openfinance-mcp-mtls-certs
            defaultMode: 0400
        - name: app-secrets
          secret:
            secretName: openfinance-mcp-secrets
            defaultMode: 0400
            items:
              - key: client-id
                path: CLIENT_ID
              - key: client-secret
                path: CLIENT_SECRET
              - key: anthropic-api-key
                path: ANTHROPIC_API_KEY

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - openfinance-mcp
                topologyKey: kubernetes.io/hostname
