apiVersion: v1
kind: ConfigMap
metadata:
  name: openfinance-mcp-config
  namespace: fintech
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  MTLS_ENABLED: "true"
  MTLS_CERT_PATH: "/app/certs/client.crt"
  MTLS_KEY_PATH: "/app/certs/client.key"
  REDIRECT_URI: "https://your-domain.com/callback"
  CONSENT_EXPIRY_HOURS: "720"
  HTTP_TIMEOUT_SECONDS: "30"
  HTTP_MAX_RETRIES: "3"
  DSPY_MODEL: "anthropic/claude-haiku-4-5-20251001"
  DSPY_CACHE_ENABLED: "true"
  MCP_TRANSPORT: "streamable-http"
  MCP_HTTP_HOST: "0.0.0.0"
  MCP_HTTP_PORT: "8000"
  MCP_HTTP_ALLOWED_ORIGINS: '["https://your-domain.com"]'
  # Required because Streamable HTTP binds to a network-reachable address.
  # Replace both values with the IdP issuer and this server's canonical URL.
  MCP_OAUTH_ISSUER_URL: "https://your-idp.example.com"
  MCP_OAUTH_RESOURCE_SERVER_URL: "https://your-domain.com"
  PRIVATE_KEY_PATH: "/app/secrets/private-key.pem"
  PRIVATE_KEY_KID: "CHANGE_ME"
  REDIS_URL: "redis://redis.fintech.svc.cluster.local:6379/0"

---
apiVersion: v1
kind: Secret
metadata:
  name: openfinance-mcp-secrets
  namespace: fintech
type: Opaque
stringData:
  # REPLACE with real values via kubectl create secret or Vault
  client-id: "CHANGE_ME"
  client-secret: "CHANGE_ME"
  anthropic-api-key: "CHANGE_ME"
  private-key.pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_ME
    -----END PRIVATE KEY-----

---
apiVersion: v1
kind: Secret
metadata:
  name: openfinance-mcp-mtls-certs
  namespace: fintech
type: Opaque
data:
  client.crt: ""
  client.key: ""

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openfinance-mcp-sa
  namespace: fintech
  labels:
    app: openfinance-mcp
automountServiceAccountToken: false
