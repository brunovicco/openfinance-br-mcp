name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: black
        run: uv run black --check .

      - name: ruff
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy src/

      - name: pytest
        env:
          CLIENT_ID: ci_test_client_id
          CLIENT_SECRET: ci_test_client_secret
          MTLS_ENABLED: "false"
        run: uv run pytest tests/
