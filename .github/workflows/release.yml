name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DSPY_CACHEDIR: ${{ runner.temp }}/dspy-cache
      LITELLM_LOCAL_MODEL_COST_MAP: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install locked dependencies
        run: uv sync --python 3.12 --frozen

      - name: Verify tag and package versions
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION="$(uv run python -c 'from openfinance_br_mcp import __version__; print(__version__)')"
          test "v${PACKAGE_VERSION}" = "${RELEASE_TAG}"
          uv run pytest tests/unit/test_release_metadata.py --no-cov

      - name: Run quality gate
        env:
          MTLS_ENABLED: "false"
        run: |
          uv run black --check .
          uv run ruff check .
          uv run mypy src/
          uv run pytest tests/

      - name: Build distributions
        run: uv build

      - name: Validate PyPI metadata
        run: uv run twine check dist/*

      - name: Smoke-test built wheel
        run: |
          uv venv --python 3.12 /tmp/openfinance-release-smoke
          uv pip install --python /tmp/openfinance-release-smoke/bin/python dist/*.whl
          /tmp/openfinance-release-smoke/bin/python -c "from openfinance_br_mcp import __version__; from openfinance_br_mcp.server import main; assert __version__ == '${GITHUB_REF_NAME#v}'"

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/openfinance-br-mcp
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/

  publish-mcp-registry:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Wait for the package to become available on PyPI
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error "https://pypi.org/pypi/openfinance-br-mcp/${VERSION}/json" >/dev/null; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Install MCP Publisher
        run: |
          curl --fail --location --silent --show-error --output /tmp/mcp-publisher.tar.gz https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz
          echo "1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf  /tmp/mcp-publisher.tar.gz" | sha256sum --check
          tar --extract --gzip --file /tmp/mcp-publisher.tar.gz --directory /tmp mcp-publisher

      - name: Validate and publish MCP metadata
        run: |
          /tmp/mcp-publisher validate
          /tmp/mcp-publisher login github-oidc
          /tmp/mcp-publisher publish

  github-release:
    needs: [publish-pypi, publish-mcp-registry]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist

      - name: Create GitHub release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"
